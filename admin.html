<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <script type="module" src="admin.js" defer></script>
</head>
<body>
  <div class="container auth-shell">
    <div class="top-row">
      <h1>Admin View</h1>
      <a class="button-link" href="lobby.html">Back to lobby</a>
    </div>

    <div id="game-meta" class="panel"></div>

    <div class="panel">
      <h2>Initiative list</h2>
      <ul id="admin-entry-list" class="simple-list"></ul>
    </div>

    <div class="panel">
      <h2>Quick note</h2>
      <p class="muted">
        This page is where you should later merge your existing <code>group.html</code> or <code>group_dnd.html</code> tracker UI.
        The key change is that it should read from <code>games/{code}/entries</code> instead of <code>rankings/</code>.
      </p>
    </div>

    <p id="admin-status" class="muted"></p>
  </div>
</body>
</html>
