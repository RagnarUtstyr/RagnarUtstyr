<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Sheet</title>

  <link rel="stylesheet" id="style-openlegend" href="style.css" disabled />
  <link rel="stylesheet" id="style-dnd" href="style_dnd.css" disabled />
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet" />

<style>
  .player-page.player-shell {
    max-width: 980px;
  }

  .player-page .player-panel {
    background: rgba(11, 41, 36, 0.55);
    border: 1px solid #2d3d73;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .player-page .field-stack {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  .player-page .field-stack label {
    font-size: 0.95rem;
    opacity: 0.9;
  }

  .player-page .field-stack input {
    width: 100%;
    box-sizing: border-box;
    min-width: 0;
  }

  .player-page .button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .player-page .hidden {
    display: none !important;
  }

  .player-page .name-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .player-page .initiative-panel {
    max-width: 280px;
  }

  .player-page .initiative-panel button {
    margin-top: 10px;
    width: 100%;
  }

  .player-page .dnd-hp-top {
    max-width: 240px;
    margin: 0 auto 18px auto;
    text-align: center;
  }

  .player-page .dnd-ac-prof {
    display: grid;
    grid-template-columns: repeat(2, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }

  .player-page .dnd-stats-columns {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 18px;
    align-items: start;
  }

  .player-page .dnd-stat-column {
    display: grid;
    gap: 12px;
    min-width: 0;
  }

  .player-page .ol-top-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(180px, 1fr));
    gap: 12px;
  }

  .player-page .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .player-page .stat-card {
    background: rgba(20, 22, 30, 0.9);
    border: 1px solid #2d3d73;
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: center;
    min-width: 0;
  }

  .player-page .hp-card {
    border-color: #8b0000;
  }

  .player-page .stat-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    opacity: 0.85;
  }

  .player-page .stat-value {
    font-size: 2rem;
    font-weight: bold;
    color: #e3cf95;
  }

  .player-page .damage-panel {
    display: grid;
    grid-template-columns: 120px 1fr auto;
    gap: 12px;
    align-items: end;
    margin-top: 18px;
  }

  .player-page .damage-options {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    min-height: 40px;
  }

  .player-page .damage-options label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .player-page .calc-result {
    min-height: 1.4em;
    margin-top: 12px;
  }

  .player-page .tracker-form {
    display: grid;
    grid-template-columns: 1.3fr 110px auto;
    gap: 10px;
    margin-bottom: 18px;
  }

  .player-page .tracker-form-inline {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: -6px 0 18px 0;
  }

  .player-page .tracker-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 10px;
  }

  .player-page .tracker-card {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    background: rgba(11, 41, 36, 0.85);
    border: 1px solid #1a3b4a;
    border-radius: 8px;
    padding: 12px;
  }

  .player-page .tracker-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .player-page .tracker-name {
    font-weight: bold;
    color: #e3cf95;
    font-size: 1.05rem;
  }

  .player-page .tracker-progress {
    color: #bdb382;
  }

  .player-page .tracker-boxes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(20px, 20px));
    gap: 8px;
    align-items: center;
    justify-content: start;
  }

  .player-page .tracker-boxes input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid #2d3d73;
    border-radius: 4px;
    background: #1b1b1b;
    display: inline-block;
    position: relative;
    pointer-events: none;
    margin: 0;
  }

  .player-page .tracker-boxes input[type="checkbox"]:checked {
    background: #8b0000;
    border-color: #8b0000;
  }

  .player-page .tracker-boxes input[type="checkbox"]:checked::after {
    content: "";
    position: absolute;
    left: 5px;
    top: 1px;
    width: 6px;
    height: 12px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .player-page .tracker-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .player-page .empty-state {
    padding: 14px;
    border: 1px dashed #2d3d73;
    border-radius: 8px;
    text-align: center;
    opacity: 0.85;
  }

  .player-page .button-small {
    padding: 6px 10px;
    font-size: 0.85rem;
    line-height: 1.1;
  }

  @media (max-width: 900px) {
    .player-page .ol-top-grid,
    .player-page .stat-grid,
    .player-page .damage-panel,
    .player-page .tracker-form,
    .player-page .tracker-card {
      grid-template-columns: 1fr;
    }

    .player-page .dnd-ac-prof {
      grid-template-columns: 1fr 1fr;
    }

    .player-page .dnd-stats-columns {
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
  }

  @media (max-width: 640px) {
    .player-page.player-shell {
      max-width: 100%;
    }

    .player-page .player-panel {
      padding: 12px;
    }

    .player-page .initiative-panel {
      max-width: 100%;
    }

    .player-page .dnd-hp-top {
      max-width: 100%;
      margin: 0 0 16px 0;
    }

    .player-page .dnd-ac-prof {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .player-page .dnd-stats-columns {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .player-page .ol-top-grid,
    .player-page .stat-grid,
    .player-page .damage-panel,
    .player-page .tracker-form,
    .player-page .tracker-card {
      grid-template-columns: 1fr;
    }

    .player-page .button-row {
      flex-direction: column;
      align-items: stretch;
    }

    .player-page .button-row button {
      width: 100%;
    }

    .player-page .tracker-controls {
      justify-content: stretch;
    }

    .player-page .tracker-controls button {
      width: 100%;
    }

    .player-page .tracker-boxes {
      grid-template-columns: repeat(8, 20px);
      gap: 6px;
    }
  }
</style>

  <script type="module" src="player.js" defer></script>
</head>
<body>
  <div class="container auth-shell player-shell player-page">
    <div class="top-row">
      <h1>Player Sheet</h1>
      <a class="button-link" href="lobby.html">Back to lobby</a>
    </div>

    <div id="player-game-meta" class="player-panel"></div>

    <div class="player-panel">
      <h2>Name</h2>
      <div class="name-grid">
        <div class="field-stack">
          <label for="player-name">Character Name</label>
          <input type="text" id="player-name" placeholder="Character name" />
        </div>
      </div>
    </div>

    <div class="player-panel initiative-panel">
      <h2>Initiative</h2>
      <div class="field-stack">
        <label for="player-initiative">Initiative</label>
        <input type="number" id="player-initiative" placeholder="17" />
      </div>
      <button id="save-initiative-button" type="button">Initiative</button>
    </div>

    <section id="player-dnd-section" class="hidden">
      <div class="player-panel">
        <h2>D&amp;D Sheet</h2>

        <div class="dnd-hp-top">
          <div class="field-stack">
            <label for="player-hp">HP</label>
            <input type="number" id="player-hp" placeholder="24" />
          </div>
        </div>

        <div class="dnd-ac-prof">
          <div class="field-stack">
            <label for="player-ac">AC</label>
            <input type="number" id="player-ac" placeholder="16" />
          </div>

          <div class="field-stack">
            <label for="player-prof">Prof</label>
            <input type="number" id="player-prof" placeholder="2" />
          </div>
        </div>

        <div class="dnd-stats-columns">
          <div class="dnd-stat-column">
            <div class="field-stack">
              <label for="player-str">STR</label>
              <input type="number" id="player-str" placeholder="10" />
            </div>

            <div class="field-stack">
              <label for="player-dex">DEX</label>
              <input type="number" id="player-dex" placeholder="14" />
            </div>

            <div class="field-stack">
              <label for="player-con">CON</label>
              <input type="number" id="player-con" placeholder="12" />
            </div>
          </div>

          <div class="dnd-stat-column">
            <div class="field-stack">
              <label for="player-int">INT</label>
              <input type="number" id="player-int" placeholder="8" />
            </div>

            <div class="field-stack">
              <label for="player-wis">WIS</label>
              <input type="number" id="player-wis" placeholder="13" />
            </div>

            <div class="field-stack">
              <label for="player-cha">CHA</label>
              <input type="number" id="player-cha" placeholder="15" />
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="player-openlegend-section" class="hidden">
      <div class="player-panel">
        <h2>Open Legend Sheet</h2>

        <div class="ol-top-grid">
          <div class="field-stack">
            <label for="player-ol-base-hp">HP</label>
            <input type="number" id="player-ol-base-hp" placeholder="30" />
          </div>

          <div class="field-stack">
            <label for="player-ol-current-hp">Current HP</label>
            <input type="number" id="player-ol-current-hp" placeholder="30" />
          </div>

          <div class="field-stack">
            <label for="player-ol-grd">GRD</label>
            <input type="number" id="player-ol-grd" placeholder="14" />
          </div>

          <div class="field-stack">
            <label for="player-ol-res">RES</label>
            <input type="number" id="player-ol-res" placeholder="12" />
          </div>

          <div class="field-stack">
            <label for="player-ol-tgh">TGH</label>
            <input type="number" id="player-ol-tgh" placeholder="13" />
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <span class="stat-label">GRD</span>
            <span class="stat-value" id="ol-stat-grd">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">RES</span>
            <span class="stat-value" id="ol-stat-res">—</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">TGH</span>
            <span class="stat-value" id="ol-stat-tgh">—</span>
          </div>
          <div class="stat-card hp-card">
            <span class="stat-label">HP</span>
            <span class="stat-value" id="ol-stat-hp">—</span>
          </div>
        </div>

        <div class="damage-panel">
          <div class="field-stack">
            <label for="ol-damage-input">DMG</label>
            <input type="number" id="ol-damage-input" min="0" placeholder="Damage" />
          </div>

          <div class="field-stack">
            <label>Reduce with</label>
            <div class="damage-options">
              <label><input type="checkbox" class="ol-defense-choice" value="grd" /> GRD</label>
              <label><input type="checkbox" class="ol-defense-choice" value="res" /> RES</label>
              <label><input type="checkbox" class="ol-defense-choice" value="tgh" /> TGH</label>
            </div>
          </div>

          <div class="button-row" style="margin-top:0;">
            <button id="ol-apply-damage-btn" type="button">Apply Damage</button>
            <button id="ol-reset-hp-btn" type="button">Reset HP</button>
          </div>
        </div>

        <div class="button-row">
          <div class="field-stack" style="min-width:160px;">
            <label for="ol-heal-amount">Heal Amount</label>
            <input type="number" id="ol-heal-amount" min="0" placeholder="Heal" />
          </div>
          <button id="ol-heal-btn" type="button">Heal</button>
        </div>

        <div id="ol-calc-result" class="calc-result muted"></div>
      </div>
    </section>

    <div class="player-panel">
      <h2>Trackers</h2>
      <p class="muted" style="margin-bottom:14px;">Saved with your character in this game.</p>

      <div class="tracker-form">
        <input type="text" id="tracker-name" placeholder="Tracker name" />
        <input type="number" id="tracker-amount" min="1" placeholder="Amount" />
        <button id="create-tracker-btn" type="button">Add tracker</button>
      </div>

      <label class="tracker-form-inline muted">
        <input type="checkbox" id="tracker-start-full" />
        Start fully checked
      </label>

      <ul id="tracker-list" class="tracker-list"></ul>
      <div id="tracker-empty" class="empty-state">No trackers yet for this character.</div>
    </div>

    <p id="player-status" class="muted"></p>
  </div>
</body>
</html>
