<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Page</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <script type="module" src="player.js" defer></script>
</head>
<body>
  <div class="container auth-shell">
    <div class="top-row">
      <h1>Player View</h1>
      <a class="button-link" href="lobby.html">Back to lobby</a>
    </div>

    <div id="player-game-meta" class="panel"></div>

    <div class="panel">
      <h2>Submit your initiative</h2>
      <label for="player-name">Character name</label>
      <input type="text" id="player-name" placeholder="Aria" />

      <label for="player-initiative">Initiative</label>
      <input type="number" id="player-initiative" placeholder="17" />

      <button id="save-initiative-button" type="button">Save initiative</button>
    </div>

    <div class="panel">
      <h2>Current order</h2>
      <ul id="player-entry-list" class="simple-list"></ul>
    </div>

    <p id="player-status" class="muted"></p>
  </div>
</body>
</html>
