<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Legend Character Builder</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      background: radial-gradient(circle at top, rgba(26,59,74,0.35), rgba(11,38,33,0.85)), #12110f;
      color: #bdb382;
      font-family: 'MedievalSharp', Georgia, serif;
      display: flex;
      justify-content: center;
    }

    h1, h2, h3 { color: #e3cf95; margin-top: 0; }

    .container {
      width: min(980px, 100%);
      background-color: rgba(31, 29, 26, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 16px rgba(0,0,0,0.55);
      border: 1px solid rgba(45,61,115,0.75);
      padding: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .meta {
      color: #d4c89a;
      font-size: 0.95rem;
    }

    .save-status {
      margin: 10px 0 0;
      min-height: 1.3em;
      color: #d4c89a;
      font-size: 0.95rem;
    }

    .sheet-box {
      background: rgba(11, 41, 36, 0.55);
      border: 1px solid #1a3b4a;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border: 2px solid #2d3d73;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      color: #e0d8b7;
      font-size: 1rem;
      font-family: inherit;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    button,
    .button-link {
      background-color: #0b2621;
      color: #bdb382;
      border: 2px solid #2d3d73;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    button:hover,
    .button-link:hover {
      background-color: #1a3b4a;
      color: #fff;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .attributes-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .category-title {
      margin-bottom: 10px;
      color: #e3cf95;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .attribute-row {
      display: grid;
      grid-template-columns: minmax(110px, 1fr) 84px 74px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .attr-name {
      color: #ddd2a8;
    }

    .attr-cost {
      text-align: center;
      font-size: 0.92rem;
      color: #d5cba0;
      background: rgba(255,255,255,0.06);
      padding: 10px 6px;
      border-radius: 6px;
      border: 1px solid rgba(45,61,115,0.55);
    }

    .budget-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .budget-card {
      background: rgba(11, 41, 36, 0.55);
      border: 1px solid #1a3b4a;
      border-radius: 10px;
      padding: 12px;
    }

    .budget-label {
      color: #e3cf95;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .budget-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff4c2;
    }

    .derived-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .derived-card {
      background: rgba(11, 41, 36, 0.55);
      border: 1px solid #1a3b4a;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .derived-name {
      color: #e3cf95;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .derived-total {
      color: #fff4c2;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .debug-box {
      font-size: 0.9rem;
      white-space: pre-wrap;
      color: #d8cfac;
    }

    @media (max-width: 900px) {
      .grid-top,
      .attributes-grid,
      .budget-grid,
      .derived-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body { padding: 6px; }
      .container { padding: 10px; }
      h1 { font-size: 1.4rem; }
      .attribute-row { grid-template-columns: minmax(92px, 1fr) 72px 66px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Open Legend Character Builder</h1>
        <div id="builder-meta" class="meta">Loading game…</div>
      </div>
      <a id="back-to-player-link" class="button-link" href="player.html">Back to player</a>
    </div>

    <div class="sheet-box">
      <div class="grid-top">
        <label>
          Name
          <input id="char-name" type="text" placeholder="Character name" />
        </label>

        <label>
          XP
          <input id="char-xp" type="number" min="0" step="1" value="0" />
        </label>

        <label>
          Level
          <input id="char-level" type="number" readonly />
        </label>
      </div>

      <div class="budget-grid">
        <div class="budget-card">
          <div class="budget-label">Attribute Budget</div>
          <div id="budget-attrs" class="budget-value">0 / 40</div>
        </div>

        <div class="budget-card">
          <div class="budget-label">Feat Budget</div>
          <div id="budget-feats" class="budget-value">6</div>
        </div>

        <div class="budget-card">
          <div class="budget-label">XP Levels</div>
          <div id="budget-levels" class="budget-value">1</div>
        </div>
      </div>
    </div>

    <div class="sheet-box">
      <h2>Attributes</h2>
      <div id="attributes-wrap" class="attributes-grid"></div>
    </div>

    <div class="sheet-box">
      <h2>Derived Stats</h2>
      <div class="derived-grid">
        <div class="derived-card">
          <div class="derived-name">Guard</div>
          <div id="derived-guard" class="derived-total">0</div>
        </div>
        <div class="derived-card">
          <div class="derived-name">Toughness</div>
          <div id="derived-tgh" class="derived-total">0</div>
        </div>
        <div class="derived-card">
          <div class="derived-name">Resolve</div>
          <div id="derived-res" class="derived-total">0</div>
        </div>
        <div class="derived-card">
          <div class="derived-name">HP</div>
          <div id="derived-hp" class="derived-total">0</div>
        </div>
      </div>
    </div>

    <div class="sheet-box">
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="save-now-btn" type="button">Save Now</button>
        <button id="reload-btn" type="button">Reload From Firebase</button>
      </div>
      <div id="save-status" class="save-status"></div>
    </div>

    <div class="sheet-box">
      <h3>Debug</h3>
      <div id="debug-output" class="debug-box"></div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "./auth.js";
    import { db } from "./firebase-config.js";
    import { watchOrLoadGame } from "./game-service.js";
    import {
      ref,
      get,
      set
    } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const params = new URLSearchParams(window.location.search);
    const code = (params.get("code") || "").trim().toUpperCase();

    const metaEl = document.getElementById("builder-meta");
    const saveStatusEl = document.getElementById("save-status");
    const debugEl = document.getElementById("debug-output");
    const backLink = document.getElementById("back-to-player-link");

    const nameInput = document.getElementById("char-name");
    const xpInput = document.getElementById("char-xp");
    const levelInput = document.getElementById("char-level");

    const budgetAttrsEl = document.getElementById("budget-attrs");
    const budgetFeatsEl = document.getElementById("budget-feats");
    const budgetLevelsEl = document.getElementById("budget-levels");

    const derivedGuardEl = document.getElementById("derived-guard");
    const derivedTghEl = document.getElementById("derived-tgh");
    const derivedResEl = document.getElementById("derived-res");
    const derivedHpEl = document.getElementById("derived-hp");

    const attributesWrap = document.getElementById("attributes-wrap");
    const saveNowBtn = document.getElementById("save-now-btn");
    const reloadBtn = document.getElementById("reload-btn");

    const RULES = {
      creation: {
        level: 1,
        attributePoints: 40,
        featPoints: 6,
        xpPerAdvance: {
          attributePoints: 3,
          featPoints: 1,
          levelEveryXp: 3
        }
      },
      categories: {
        physical: ["Agility", "Fortitude", "Might"],
        mental: ["Learning", "Logic", "Perception", "Will"],
        social: ["Deception", "Persuasion", "Presence"],
        extraordinary: ["Alteration", "Creation", "Energy", "Entropy", "Influence", "Movement", "Prescience", "Protection"]
      }
    };

    const ATTRIBUTE_ORDER = [
      ...RULES.categories.physical,
      ...RULES.categories.mental,
      ...RULES.categories.social,
      ...RULES.categories.extraordinary
    ];

    let user = null;
    let game = null;
    let autoSaveTimer = null;
    let isSaving = false;

    const character = {
      name: "",
      xp: 0,
      attributes: Object.fromEntries(ATTRIBUTE_ORDER.map((attr) => [attr, 0]))
    };

    function cleanInt(value) {
      const n = parseInt(value, 10);
      return Number.isNaN(n) ? 0 : Math.max(0, n);
    }

    function attributeCost(score) {
      const n = cleanInt(score);
      return (n * (n + 1)) / 2;
    }

    function spentAttributePoints(attributes) {
      return Object.values(attributes).reduce((total, value) => total + attributeCost(value), 0);
    }

    function getXpAwards(xp) {
      const safeXp = cleanInt(xp);
      const perXp = RULES.creation.xpPerAdvance;
      return {
        xp: safeXp,
        bonusAttributePoints: safeXp * perXp.attributePoints,
        bonusFeatPoints: safeXp * perXp.featPoints,
        earnedLevels: Math.floor(safeXp / perXp.levelEveryXp),
        level: RULES.creation.level + Math.floor(safeXp / perXp.levelEveryXp)
      };
    }

    function getDerivedStats() {
      const a = character.attributes;
      return {
        guard: 10 + a.Agility + a.Might,
        toughness: 10 + a.Fortitude + a.Will,
        resolve: 10 + a.Presence + a.Will,
        hp: 10 + (2 * (a.Fortitude + a.Presence + a.Will))
      };
    }

    function renderAttributes() {
      attributesWrap.innerHTML = Object.entries(RULES.categories).map(([category, attrs]) => {
        return `
          <div class="sheet-box">
            <div class="category-title">${category.charAt(0).toUpperCase() + category.slice(1)}</div>
            ${attrs.map((attr) => `
              <div class="attribute-row">
                <div class="attr-name">${attr}</div>
                <div class="attr-cost">${attributeCost(character.attributes[attr])} pts</div>
                <input data-attr="${attr}" type="number" min="0" value="${cleanInt(character.attributes[attr])}">
              </div>
            `).join("")}
          </div>
        `;
      }).join("");
    }

    function syncFromDom() {
      character.name = nameInput.value.trim();
      character.xp = cleanInt(xpInput.value);

      ATTRIBUTE_ORDER.forEach((attr) => {
        const input = attributesWrap.querySelector(`[data-attr="${CSS.escape(attr)}"]`);
        if (input) {
          character.attributes[attr] = cleanInt(input.value);
        }
      });
    }

    function renderAll() {
      const xpAwards = getXpAwards(character.xp);
      const derived = getDerivedStats();
      const attrSpent = spentAttributePoints(character.attributes);
      const attrTotal = RULES.creation.attributePoints + xpAwards.bonusAttributePoints;
      const featTotal = RULES.creation.featPoints + xpAwards.bonusFeatPoints;

      nameInput.value = character.name;
      xpInput.value = character.xp;
      levelInput.value = xpAwards.level;

      renderAttributes();

      budgetAttrsEl.textContent = `${attrSpent} / ${attrTotal}`;
      budgetFeatsEl.textContent = String(featTotal);
      budgetLevelsEl.textContent = String(xpAwards.level);

      derivedGuardEl.textContent = String(derived.guard);
      derivedTghEl.textContent = String(derived.toughness);
      derivedResEl.textContent = String(derived.resolve);
      derivedHpEl.textContent = String(derived.hp);

      debugEl.textContent = JSON.stringify({
        code,
        userUid: user?.uid || null,
        name: character.name,
        xp: character.xp,
        derived
      }, null, 2);
    }

    function scheduleSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        saveToFirebase("Auto-saved.");
      }, 500);
    }

    async function saveToFirebase(successMessage = "Saved.") {
      if (isSaving) return;
      isSaving = true;
      saveStatusEl.textContent = "Saving…";

      try {
        syncFromDom();

        const builderPath = `games/${code}/players/${user.uid}/openLegendBuilder`;
        const playerPath = `games/${code}/players/${user.uid}`;

        const existingPlayerSnap = await get(ref(db, playerPath));
        const existingPlayer = existingPlayerSnap.exists() ? existingPlayerSnap.val() : {};

        const xpAwards = getXpAwards(character.xp);
        const derived = getDerivedStats();

        const builderPayload = {
          name: character.name,
          xp: character.xp,
          level: xpAwards.level,
          attributes: { ...character.attributes },
          updatedAt: Date.now()
        };

        const derivedBaseHp = derived.hp;
        const existingCurrentHp = Number(existingPlayer.currentHp);
        const nextCurrentHp = Number.isFinite(existingCurrentHp)
          ? Math.max(0, Math.min(existingCurrentHp, derivedBaseHp))
          : derivedBaseHp;

        const playerPayload = {
          ...(existingPlayer || {}),
          uid: user.uid,
          userEmail: user.email || "",
          userName: user.displayName || "",
          mode: "openlegend",
          name: character.name || user.displayName || "",
          baseHp: derivedBaseHp,
          currentHp: nextCurrentHp,
          grd: derived.guard,
          res: derived.resolve,
          tgh: derived.toughness,
          builderUpdatedAt: Date.now()
        };

        await set(ref(db, builderPath), builderPayload);
        await set(ref(db, playerPath), playerPayload);

        saveStatusEl.textContent = successMessage;
        debugEl.textContent = JSON.stringify({
          code,
          userUid: user.uid,
          builderPath,
          playerPath,
          builderPayload,
          playerPayload
        }, null, 2);
      } catch (error) {
        console.error("Save failed:", error);
        saveStatusEl.textContent = `Save failed: ${error.message || error}`;
      } finally {
        isSaving = false;
      }
    }

    async function loadFromFirebase() {
      const builderPath = `games/${code}/players/${user.uid}/openLegendBuilder`;
      const snap = await get(ref(db, builderPath));

      if (snap.exists()) {
        const data = snap.val();
        character.name = data.name || "";
        character.xp = cleanInt(data.xp);
        ATTRIBUTE_ORDER.forEach((attr) => {
          character.attributes[attr] = cleanInt(data.attributes?.[attr]);
        });
        saveStatusEl.textContent = "Loaded from Firebase.";
      } else {
        character.name = user.displayName || "";
        character.xp = 0;
        ATTRIBUTE_ORDER.forEach((attr) => {
          character.attributes[attr] = 0;
        });
        saveStatusEl.textContent = "No builder save found yet.";
      }

      renderAll();
    }

    async function init() {
      user = await requireAuth();

      if (!code) {
        metaEl.textContent = "Missing game code.";
        saveStatusEl.textContent = "Cannot load builder without a game code.";
        return;
      }

      game = await watchOrLoadGame(code);
      if (!game) {
        metaEl.textContent = "Game not found.";
        saveStatusEl.textContent = "Could not find this game.";
        return;
      }

      const normalizedMode = String(game.mode || "").toLowerCase();
      if (normalizedMode !== "openlegend" && normalizedMode !== "ol" && normalizedMode !== "open_legend") {
        metaEl.textContent = "This builder is for Open Legend games only.";
        saveStatusEl.textContent = "Wrong game mode.";
        return;
      }

      metaEl.textContent = `Game: ${game.title} · Code: ${game.code}`;
      backLink.href = `player.html?code=${encodeURIComponent(code)}`;

      await loadFromFirebase();
    }

    nameInput.addEventListener("input", () => {
      syncFromDom();
      renderAll();
      scheduleSave();
    });

    xpInput.addEventListener("input", () => {
      syncFromDom();
      renderAll();
      scheduleSave();
    });

    attributesWrap.addEventListener("input", (event) => {
      if (!event.target.matches("[data-attr]")) return;
      syncFromDom();
      renderAll();
      scheduleSave();
    });

    saveNowBtn.addEventListener("click", async () => {
      await saveToFirebase("Saved.");
    });

    reloadBtn.addEventListener("click", async () => {
      await loadFromFirebase();
    });

    init().catch((error) => {
      console.error(error);
      saveStatusEl.textContent = error.message || "Could not load builder.";
    });
  </script>
</body>
</html>
